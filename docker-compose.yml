version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/cloud-monitor
      - JWT_SECRET=secret
      - JWT_REFRESH_SECRET=refreshsecret
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"